conky.config = {
    alignment = 'middle_right',
    background = true,
    default_color = 'F9FAF9',
    color2 = '8f5f95',
    double_buffer = true,
    font = 'Bitstream Vera Sans:size=8',
    draw_shades = false,
    gap_x = 19,
    gap_y = -10,
   	update_interval = 2.0,
	cpu_avg_samples = 2,
	net_avg_samples = 2,
	draw_graph_borders = false,
	minimum_width = 260, minimum_height = 5,
	draw_outline = false,
	draw_borders = false,
    no_buffers = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'override',
    own_window_transparent = true,
    own_window_argb_visual = true,
    use_xft = true,
}
conky.text = [[
${font DejaVu Sans Mono:bold:size=32}
${alignc}${color darkgrey}   ${execi 43200 checkupdates | wc -l}${font DejaVu Sans Mono:bold:size=24}${color #1f7177} Updates ${font DejaVu Sans Mono:bold:size=14}${color #1f7177}AUR ${font DejaVu Sans Mono:bold:size=12}${color darkgrey}${execi 43200 yay -Qu | wc -l}

$font${color darkgrey}${alignc}$kernel

${font DejaVu Sans Mono:size=12}${color lightgrey}${alignc}$uptime_short
${color 5e5e5e}${hr 3}

${color darkgrey}Processes$color $processes${alignr}$color$running_processes ${color darkgrey}running 
 
${font DejaVu Sans Mono:bold}${color #1f7177}CPU   ${cpu cpu0}%       @ ${freq} MHz ${alignr}Temp:${hwmon 1 temp 1}C

$font${color}${alignr}PID       CPU%   MEM%
${font Monospace:size=8} ${color lightgrey}${top name 1}${alignr}${top pid 1}  ${top cpu 1}  ${top mem 1}
 ${color lightgrey}${top name 2}${alignr}${top pid 2}  ${top cpu 2}  ${top mem 2}
 ${color lightgrey}${top name 3}${alignr}${top pid 3}  ${top cpu 3}  ${top mem 3}
${alignr}${cpugraph 48,395 1f7177 6f6f6f}

${font DejaVu Sans Mono:bold:size=12}${color #1f7177}RAM ${alignc}${execi 2 awk '/^Mem/ {print $3}' <(free -m)} MiB/ $memmax ${membar}
${font Monospace:size=10}${alignr}${color darkgrey}Swap $swap/$swapmax 

$font${color}${alignr}PID       CPU%   MEM%
${font Monospace:size=8} ${color lightgrey}${top_mem name 1}${alignr}${top_mem pid 1}  ${top_mem cpu 1}  ${top_mem mem 1}
 ${color lightgrey}${top_mem name 2}${alignr}${top_mem pid 2}  ${top_mem cpu 2}  ${top_mem mem 2}
 ${color lightgrey}${top_mem name 3}${alignr}${top_mem pid 3}  ${top_mem cpu 3}  ${top_mem mem 3}


${font DejaVu Sans Mono:bold:size=12}${color #1f7177}Connections${alignr}${color #1f7177}In:$color ${tcp_portmon 1 32767 count}  ${color #1f7177}Out:$color ${tcp_portmon 32768 65535 count}   ${color #1f7177}All:$color ${tcp_portmon 1 65535 count}
${color 5e5e5e}${hr 3}
${font DejaVu Sans Mono:size=12}${color lightgrey}Down$color${font DejaVu Sans Mono:bold:size=12} ${downspeed enp3s0}/s${alignr}$color${upspeed enp3s0}/s  ${color lightgrey}${font DejaVu Sans Mono:size=12}Up

${alignc}${downspeedgraph enp3s0 32,195 1f7177 6f6f6f} ${alignr}${upspeedgraph enp3s0 32,195 1f7177 6f6f6f}
${color 5e5e5e}${hr 3}
${font DejaVu Sans Mono:size=12}${color #1f7177}Inbound ${alignr} Service/Port$color
${font Monospace:size=8} ${tcp_portmon 1 32767 rhost 0} ${alignr} ${tcp_portmon 1 32767 lservice 0}
 ${tcp_portmon 1 32767 rhost 1} ${alignr} ${tcp_portmon 1 32767 lservice 1}
 ${tcp_portmon 1 32767 rhost 2} ${alignr} ${tcp_portmon 1 32767 lservice 2}
 ${tcp_portmon 1 32767 rhost 3} ${alignr} ${tcp_portmon 1 32767 lservice 3}
 ${tcp_portmon 1 32767 rhost 4} ${alignr} ${tcp_portmon 1 32767 lservice 4}
 ${tcp_portmon 1 32767 rhost 5} ${alignr} ${tcp_portmon 1 32767 lservice 5}
${font DejaVu Sans Mono:size=12}${color #1f7177}Outbound ${alignr} Service/Port$color
${font Monospace:size=8} ${tcp_portmon 32768 61000 rhost 0} ${alignr} ${tcp_portmon 32768 61000 rservice 0}
 ${tcp_portmon 32768 65535 rhost 1} ${alignr} ${tcp_portmon 32768 65535 rservice 1}
 ${tcp_portmon 32768 65535 rhost 2} ${alignr} ${tcp_portmon 32768 65535 rservice 2}
 ${tcp_portmon 32768 65535 rhost 3} ${alignr} ${tcp_portmon 32768 65535 rservice 3}
 ${tcp_portmon 32768 65535 rhost 4} ${alignr} ${tcp_portmon 32768 65535 rservice 4}
 ${tcp_portmon 32768 65535 rhost 5} ${alignr} ${tcp_portmon 32768 65535 rservice 5}
${color 5e5e5e}${hr 3}
${font DejaVu Sans Mono:size=10}${color darkgrey} Disk${alignc}${fs_used /}/${fs_size /} ${fs_bar /}


${font DejaVu Sans Mono:bold:size=12}${color #1f7177}${alignc}PCKGS $color${execi 43000 pacman -Q | wc -l}  ${color #1f7177}|  $color${execi 43100 pacman -Qm | wc -l} ${color #1f7177}AUR  

]];
